<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structured Data Viewer</title>
<!--
  Color Palette based on Catppuccin (https://github.com/catppuccin/catppuccin)
  Copyright (c) 2021 Catppuccin
  Licensed under the MIT License
-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap');

:root {
    /* Catppuccin Mocha (Dark) */
    --bg-main: #11111b; /* Crust */
    --bg-panel: #181825; /* Mantle */
    --bg-editor: #1e1e2e; /* Base */
    --bg-hover: #313244; /* Surface0 */
    --border: #45475a; /* Surface1 */
    --border-accent: #585b70; /* Surface2 */
    --text-primary: #cdd6f4; /* Text */
    --text-secondary: #bac2de; /* Subtext1 */
    --text-muted: #7f849c; /* Overlay1 */
    --accent-blue: #89b4fa; /* Blue */
    --accent-purple: #cba6f7; /* Mauve */
    --accent-green: #a6e3a1; /* Green */
    --accent-orange: #fab387; /* Peach */
    --accent-pink: #f5c2e7; /* Pink */
    --accent-cyan: #74c7ec; /* Sapphire */
    --accent-red: #f38ba8; /* Red */
    --accent-yellow: #f9e2af; /* Yellow */
    --type-string: var(--accent-green);
    --type-number: var(--accent-blue);
    --type-boolean: var(--accent-orange);
    --type-null: var(--accent-red);
    --type-key: var(--text-primary);
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  [data-theme="light"] {
    /* Catppuccin Latte (Light) */
    --bg-main: #dce0e8; /* Crust */
    --bg-panel: #e6e9ef; /* Mantle */
    --bg-editor: #eff1f5; /* Base */
    --bg-hover: #ccd0da; /* Surface0 */
    --border: #bcc0cc; /* Surface1 */
    --border-accent: #acb0be; /* Surface2 */
    --text-primary: #4c4f69; /* Text */
    --text-secondary: #5c5f77; /* Subtext1 */
    --text-muted: #8c8fa1; /* Overlay1 */
    --accent-blue: #1e66f5; /* Blue */
    --accent-purple: #8839ef; /* Mauve */
    --accent-green: #40a02b; /* Green */
    --accent-orange: #fe640b; /* Peach */
    --accent-pink: #ea76cb; /* Pink */
    --accent-cyan: #209fb5; /* Sapphire */
    --accent-red: #d20f39; /* Red */
    --accent-yellow: #df8e1d; /* Yellow */
    --type-string: var(--accent-green);
    --type-number: var(--accent-blue);
    --type-boolean: var(--accent-orange);
    --type-null: var(--accent-red);
    --type-key: var(--text-primary);
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  /* ライトテーマ用の透過カラー（Catppuccin LatteのRGB値） */
  [data-theme="light"] .logo-icon { box-shadow: 0 2px 8px rgba(30,102,245,0.25); }
  [data-theme="light"] .resize-handle { background: var(--border); }
  [data-theme="light"] .tree-type-badge.string { background: rgba(64,160,43,0.10); }
  [data-theme="light"] .tree-type-badge.number { background: rgba(30,102,245,0.10); }
  [data-theme="light"] .tree-type-badge.boolean { background: rgba(254,100,11,0.10); }
  [data-theme="light"] .tree-type-badge.null { background: rgba(210,15,57,0.10); }
  [data-theme="light"] .tree-type-badge.object { background: rgba(136,57,239,0.10); }
  [data-theme="light"] .tree-type-badge.array { background: rgba(32,159,181,0.10); }
  [data-theme="light"] .error-box {
    background: rgba(210,15,57,0.06);
    border-color: rgba(210,15,57,0.2);
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', 'JetBrains Mono', sans-serif;
    background: var(--bg-main);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: background 0.3s, color 0.3s;
  }

  body *, body *::before, body *::after {
    transition: background 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
  }

  .logo h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-stats {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  .stat-dot.blue { background: var(--accent-blue); }
  .stat-dot.purple { background: var(--accent-purple); }
  .stat-dot.green { background: var(--accent-green); }

  /* ── Theme Toggle ── */
  .theme-toggle {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-editor);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.3s;
    flex-shrink: 0;
    margin-left: 12px;
  }

  .theme-toggle:hover {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    background: rgba(108, 140, 255, 0.08);
  }

  /* ── Main ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left Panel ── */
  .panel-left {
    width: 45%;
    min-width: 300px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--bg-panel);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
  }

  .format-tabs {
    display: flex;
    gap: 2px;
    background: var(--bg-main);
    border-radius: 6px;
    padding: 2px;
  }

  .format-tab {
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.2s;
    font-family: 'JetBrains Mono', monospace;
  }

  .format-tab.active {
    background: var(--accent-blue);
    color: #fff;
  }

  .format-tab:hover:not(.active) {
    color: var(--text-primary);
  }

  .editor-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .editor-wrap textarea {
    width: 100%;
    height: 100%;
    background: var(--bg-editor);
    border: none;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    padding: 16px 20px;
    resize: none;
    outline: none;
    tab-size: 2;
  }

  .editor-wrap textarea::placeholder {
    color: var(--text-muted);
  }

  .editor-actions {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg-panel);
    flex-shrink: 0;
  }

  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg-editor);
    color: var(--text-secondary);
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .btn:hover {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    background: rgba(108, 140, 255, 0.08);
  }

  .btn.primary {
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    color: #fff;
    border: none;
  }

  .btn.primary:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  .btn.history-btn {
    min-width: 80px;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }

  /* ── Resize Handle ── */
  .resize-handle {
    width: 5px;
    cursor: col-resize;
    background: var(--border);
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .resize-handle:hover,
  .resize-handle.dragging {
    background: var(--accent-blue);
  }

  /* ── Right Panel ── */
  .panel-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-panel);
    overflow: hidden;
  }

  .view-tabs {
    display: flex;
    gap: 0;
    background: var(--bg-main);
    border-radius: 8px;
    padding: 3px;
  }

  .view-tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.25s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .view-tab.active {
    background: var(--bg-panel);
    color: var(--text-primary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .view-tab:hover:not(.active) {
    color: var(--text-secondary);
  }

  .view-tab .icon {
    font-size: 14px;
  }

  .preview-area {
    flex: 1;
    overflow: auto;
    padding: 20px;
  }

  .preview-area::-webkit-scrollbar { width: 6px; }
  .preview-area::-webkit-scrollbar-track { background: transparent; }
  .preview-area::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 3px; }

  /* ── Tree View ── */
  .tree-node {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
  }

  .tree-item {
    display: flex;
    align-items: flex-start;
    padding: 2px 0;
    cursor: default;
  }

  .tree-item:hover {
    background: var(--bg-hover);
    border-radius: 4px;
  }

  .tree-toggle {
    width: 20px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    transition: transform 0.2s, color 0.2s;
    flex-shrink: 0;
    user-select: none;
    font-size: 10px;
  }

  .tree-toggle.open {
    transform: rotate(90deg);
  }

  .tree-toggle:hover {
    color: var(--accent-blue);
  }

  .tree-toggle.invisible {
    visibility: hidden;
  }

  .tree-key {
    color: var(--type-key);
    font-weight: 500;
    margin-right: 4px;
  }

  .tree-colon {
    color: var(--text-muted);
    margin-right: 8px;
  }

  .tree-value.string { color: var(--type-string); }
  .tree-value.number { color: var(--type-number); }
  .tree-value.boolean { color: var(--type-boolean); }
  .tree-value.null { color: var(--type-null); font-style: italic; }

  .tree-type-badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    margin-left: 8px;
    vertical-align: middle;
  }

  .tree-type-badge.string { background: rgba(74,222,128,0.12); color: var(--type-string); }
  .tree-type-badge.number { background: rgba(108,140,255,0.12); color: var(--type-number); }
  .tree-type-badge.boolean { background: rgba(251,146,60,0.12); color: var(--type-boolean); }
  .tree-type-badge.null { background: rgba(248,113,113,0.12); color: var(--type-null); }
  .tree-type-badge.object { background: rgba(167,139,250,0.12); color: var(--accent-purple); }
  .tree-type-badge.array { background: rgba(34,211,238,0.12); color: var(--accent-cyan); }

  .tree-children {
    padding-left: 24px;
    border-left: 1px solid var(--border);
    margin-left: 9px;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .tree-children.collapsed {
    display: none;
  }

  /* ── Table View ── */
  .table-wrap {
    overflow: auto;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .data-table th {
    background: var(--bg-main);
    color: var(--text-secondary);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 2px solid var(--border-accent);
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .data-table td {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
    vertical-align: top;
    max-width: 350px;
    word-break: break-word;
  }

  .data-table tr:hover td {
    background: var(--bg-hover);
  }

  .data-table .path-cell {
    color: var(--accent-purple);
    font-weight: 500;
    white-space: nowrap;
  }

  .data-table .type-cell {
    white-space: nowrap;
  }

  /* ── Placeholder ── */
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-muted);
  }

  .placeholder-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .placeholder-text {
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
  }

  /* ── Error ── */
  .error-box {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 8px;
    padding: 14px 18px;
    color: var(--accent-red);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tree-node { animation: fadeIn 0.2s ease; }

  .bool-check {
    color: var(--accent-green);
    font-weight: 700;
    margin-left: 2px;
  }

  .bool-cross {
    color: var(--accent-red);
    font-weight: 700;
    margin-left: 2px;
  }

  /* ── Drag & Drop ── */
  .editor-wrap.drag-over {
    outline: 2px dashed var(--accent-blue);
    outline-offset: -3px;
  }

  .editor-wrap.drag-over textarea {
    opacity: 0.35;
    pointer-events: none;
  }

  .drop-overlay {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
    color: var(--accent-blue);
    font-size: 14px;
    font-weight: 600;
    background: rgba(108, 140, 255, 0.04);
    z-index: 5;
  }

  .drop-overlay .drop-icon { font-size: 40px; }
  .editor-wrap.drag-over .drop-overlay { display: flex; }

  /* ── Edit Dialog ── */
  .dialog-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }

  .dialog-backdrop.visible { display: flex; }

  .dialog {
    background: var(--bg-panel);
    border: 1px solid var(--border-accent);
    border-radius: var(--radius);
    padding: 24px 28px;
    min-width: 380px;
    max-width: 560px;
    width: 92%;
    box-shadow: 0 12px 48px rgba(0,0,0,0.4);
    animation: fadeIn 0.15s ease;
  }

  .dialog-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dialog-path {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent-purple);
    background: var(--bg-main);
    padding: 7px 12px;
    border-radius: 6px;
    margin-bottom: 18px;
    word-break: break-all;
    line-height: 1.6;
  }

  .dialog-field { margin-bottom: 14px; }

  .dialog-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .dialog-select,
  .dialog-input {
    width: 100%;
    background: var(--bg-editor);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .dialog-select:focus,
  .dialog-input:focus { border-color: var(--accent-blue); }

  .dialog-input.multiline {
    min-height: 72px;
    resize: vertical;
    line-height: 1.6;
  }

  .dialog-input:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .dialog-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 22px;
  }

  /* ── Tree edit button ── */
  .tree-edit-btn {
    margin-left: 6px;
    padding: 1px 7px;
    border-radius: 4px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, border-color 0.15s, color 0.15s;
    vertical-align: middle;
    flex-shrink: 0;
  }

  .tree-item:hover .tree-edit-btn {
    opacity: 1;
  }

  .tree-edit-btn:hover {
    background: rgba(108, 140, 255, 0.15);
    color: var(--accent-blue);
    border-color: var(--accent-blue);
  }

  /* ── Tree add button ── */
  .tree-add-btn {
    margin-left: 6px;
    padding: 1px 7px;
    border-radius: 4px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, border-color 0.15s, color 0.15s;
    vertical-align: middle;
    flex-shrink: 0;
  }

  .tree-item:hover .tree-add-btn { opacity: 1; }

  .tree-add-btn:hover {
    background: rgba(74, 222, 128, 0.15);
    color: var(--accent-green);
    border-color: var(--accent-green);
  }

  /* ── Tree delete button ── */
  .tree-del-btn {
    margin-left: 4px;
    padding: 1px 6px;
    border-radius: 4px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, border-color 0.15s, color 0.15s;
    vertical-align: middle;
    flex-shrink: 0;
  }

  .tree-item:hover .tree-del-btn { opacity: 1; }

  .tree-del-btn:hover {
    background: rgba(248, 113, 113, 0.15);
    color: var(--accent-red);
    border-color: var(--accent-red);
  }

  /* ── Table action buttons ── */
  .table-action-btn {
    padding: 1px 7px;
    border-radius: 4px;
    border: 1px solid transparent;
    background: transparent;
    font-size: 11px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, border-color 0.15s, color 0.15s;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }

  tr:hover .table-action-btn { opacity: 1; }

  .table-action-btn.edit { color: var(--text-muted); }
  .table-action-btn.edit:hover {
    background: rgba(108, 140, 255, 0.15);
    color: var(--accent-blue);
    border-color: var(--accent-blue);
  }

  .table-action-btn.add { color: var(--text-muted); }
  .table-action-btn.add:hover {
    background: rgba(74, 222, 128, 0.15);
    color: var(--accent-green);
    border-color: var(--accent-green);
  }

  .table-action-btn.del { color: var(--text-muted); }
  .table-action-btn.del:hover {
    background: rgba(248, 113, 113, 0.15);
    color: var(--accent-red);
    border-color: var(--accent-red);
  }

  .data-table .action-cell {
    white-space: nowrap;
    width: 1%;
  }

  /* ── Drag Reorder ── */
  .drag-grip {
    width: 16px;
    height: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    color: var(--text-muted);
    font-size: 14px;
    letter-spacing: -1px;
    opacity: 0.15;
    transition: opacity 0.15s, color 0.15s;
    flex-shrink: 0;
    user-select: none;
  }
  .tree-item:hover .drag-grip { opacity: 1; }
  tr:hover .drag-grip { opacity: 0.8; }
  .drag-grip:hover { color: var(--accent-blue); opacity: 1 !important; }
  .drag-grip:active { cursor: grabbing; }

  .tree-node.dnd-dragging > .tree-item { opacity: 0.3; }
  .tree-node.dnd-before > .tree-item   { box-shadow: 0 -2px 0 var(--accent-blue); }
  .tree-node.dnd-after  > .tree-item   { box-shadow: 0 2px 0 var(--accent-blue); }
  .tree-node.dnd-into   > .tree-item   {
    background: rgba(108,140,255,0.13) !important;
    border-radius: 4px;
    outline: 1px solid var(--accent-blue);
  }

  .drag-col {
    width: 28px !important;
    min-width: 28px;
    padding: 4px 4px 4px 8px !important;
    text-align: center;
  }
  tr.dnd-dragging { opacity: 0.35; }
  tr.dnd-before td { border-top: 2px solid var(--accent-blue) !important; }
  tr.dnd-after  td { border-bottom: 2px solid var(--accent-blue) !important; }
  tr.dnd-into   td { background: rgba(108,140,255,0.08) !important; }

  /* ── Export toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--accent-green);
    color: #0f1117;
    font-size: 12px;
    font-weight: 700;
    padding: 9px 20px;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 2000;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Panel header left group ── */
  .panel-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .file-label {
    font-size: 11px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    background: var(--bg-main);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 2px 8px;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: default;
    transition: color 0.2s, background 0.2s, border-color 0.2s;
  }

  .file-label.has-file {
    color: var(--accent-cyan);
    border-color: rgba(34,211,238,0.3);
    background: rgba(34,211,238,0.06);
  }

  /* ════════════════════════════════════════
     ── Responsive ──
     ════════════════════════════════════════ */

  /* ── Tablet (≤960px): narrower left panel, hide some stats ── */
  @media (max-width: 960px) {
    .stat:nth-child(n+4) { display: none; }
    .logo h1 { font-size: 13px; }
    .panel-left { width: 42%; min-width: 260px; }
    .file-label { max-width: 110px; }
  }

  /* ── Mobile (≤640px): vertical stack, full-width panels ── */
  @media (max-width: 640px) {
    body { overflow: auto; height: auto; min-height: 100dvh; }

    header {
      padding: 8px 14px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .logo h1 { font-size: 12px; }
    .logo-icon { width: 26px; height: 26px; font-size: 13px; }

    .header-stats {
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat { font-size: 11px; }
    /* show only keys + bytes on mobile */
    .stat:not(:first-child):not(:last-child) { display: none; }

    .main {
      flex-direction: column;
      overflow: visible;
      height: auto;
    }

    .panel-left {
      width: 100% !important;
      min-width: 0;
      border-right: none;
      border-bottom: 1px solid var(--border);
      height: 45dvh;
      min-height: 220px;
    }

    .resize-handle { display: none; }

    .panel-right {
      width: 100%;
      height: 50dvh;
      min-height: 260px;
    }

    .preview-area { padding: 12px; }

    .editor-actions {
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px 10px;
    }

    .btn {
      padding: 5px 10px;
      font-size: 10px;
    }

    .btn.history-btn { min-width: 64px; }

    .panel-header {
      padding: 7px 10px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .format-tabs { gap: 1px; }
    .format-tab { padding: 3px 8px; font-size: 10px; }

    .view-tabs { gap: 0; }
    .view-tab { padding: 4px 10px; font-size: 11px; }
    .view-tab .icon { font-size: 12px; }

    .file-label { max-width: 90px; }

    /* dialogs full-width on mobile */
    .dialog {
      min-width: 0 !important;
      width: 96vw !important;
      padding: 18px 16px;
    }

    .data-table { font-size: 11px; }
    .data-table td, .data-table th { padding: 6px 8px; }

    /* hide stats columns on small table */
    .data-table .path-cell { display: none; }

    /* tree slightly smaller */
    .tree-node { font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">{ }</div>
    <h1>Structured Data Viewer</h1>
  </div>
  <div class="header-stats">

    <div class="stat"><span class="stat-dot purple"></span><span id="statDepth">深さ 0</span></div>

<div class="main">

      <div class="placeholder">

</div>

<!-- ── Edit Value Dialog ── -->
<div class="dialog-backdrop" id="editDialogBackdrop">
  <div class="dialog">

<!-- ── Confirm Delete Dialog ── -->
<div class="dialog-backdrop" id="delDialogBackdrop">
  <div class="dialog" style="min-width:320px;max-width:440px">
    <div class="dialog-title">🗑 削除の確認</div>

<!-- ── Add Item Dialog ── -->
<div class="dialog-backdrop" id="addDialogBackdrop">
  <div class="dialog">
    <div class="dialog-title" id="addDialogTitle">＋ 項目を追加</div>

    </div>
    <div class="dialog-field">
      <label class="dialog-label">型</label>
      <select class="dialog-select" id="addType" onchange="onAddTypeChange()">
        <option value="string">文字列 (string)</option>
        <option value="number">数値 (number)</option>
        <option value="boolean">真偽値 (boolean)</option>
        <option value="null">null</option>
        <option value="object">オブジェクト {}</option>
        <option value="array">配列 []</option>
      </select>
    </div>
    <div class="dialog-field" id="addValueField">
      <label class="dialog-label">値</label>
      <textarea class="dialog-input multiline" id="addValueInput" rows="3" placeholder="値を入力..."></textarea>
    </div>
    <div class="dialog-field" id="addBoolField" style="display:none">
      <label class="dialog-label">値</label>
      <select class="dialog-select" id="addBoolSelect">
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeAddDialog()">キャンセル</button>
      <button class="btn primary" onclick="confirmAdd()">＋ 追加</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<script>
// ── State ──
let parsedData = null;
let currentFormat = 'json';
let currentView = 'tree';
let _droppedFileName = null;  // base name of last dropped file (no extension)
let _parseFromDrop  = false;  // flag: parseAndRender was triggered by a file drop

// ── File Label ──
function updateFileLabel() {
  const el = document.getElementById('fileLabel');
  if (!el) return;
  if (_droppedFileName) {
    el.textContent = `📄 ${_droppedFileName}`;
    el.title = _droppedFileName;
    el.classList.add('has-file');
  } else {
    el.textContent = '🆕 新規';
    el.title = '新規ファイル';
    el.classList.remove('has-file');
  }
}

// ── History (Undo / Redo) ──
// Each snapshot: { data: string|null, text: string, format: string, fileName: string|null }
const MAX_HISTORY = 50;
let _undoStack = [];
let _redoStack = [];

function _makeSnapshot() {
  return {
    data:     parsedData !== null ? JSON.stringify(parsedData) : null,
    text:     document.getElementById('inputEditor').value,
    format:   currentFormat,
    fileName: _droppedFileName
  };
}

function pushHistory() {
  // Allow push even when parsedData is null (so a clear can be undone)
  const snap = _makeSnapshot();
  if (snap.data === null && snap.text.trim() === '') return; // nothing to save
  _undoStack.push(snap);
  if (_undoStack.length > MAX_HISTORY) _undoStack.shift();
  _redoStack = [];
  _syncHistoryUI();
}

function undo() {
  if (_undoStack.length === 0) return;
  _redoStack.push(_makeSnapshot());
  _applySnapshot(_undoStack.pop());
  _syncHistoryUI();
  showToast(`↩ 元に戻しました（残り ${_undoStack.length}）`);
}

function redo() {
  if (_redoStack.length === 0) return;
  _undoStack.push(_makeSnapshot());
  _applySnapshot(_redoStack.pop());
  _syncHistoryUI();
  showToast(`↪ やり直しました（残り ${_redoStack.length}）`);
}

function _applySnapshot(snap) {
  parsedData       = snap.data !== null ? JSON.parse(snap.data) : null;
  currentFormat    = snap.format;
  _droppedFileName = snap.fileName;
  document.getElementById('inputEditor').value = snap.text;
  document.querySelectorAll('.format-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.format === snap.format));
  updateFileLabel();
  if (parsedData !== null) {
    updateStats(parsedData, null);
    render();
  } else {
    document.getElementById('previewArea').innerHTML = `
      <div class="placeholder">
        <div class="placeholder-icon">{ }</div>
        <div class="placeholder-text">左のエディタにデータを入力し<br>「プレビュー」をクリック</div>
      </div>`;
    document.getElementById('statKeys').textContent = '0 キー';
    document.getElementById('statDepth').textContent = '深さ 0';
    document.getElementById('statNodes').textContent = '0 ノード';
    document.getElementById('statUnique').textContent = '0 ユニーク';
    document.getElementById('statBytes').textContent = '0 B';
  }
}

function _syncHistoryUI() {
  const btnU = document.getElementById('btnUndo');
  const btnR = document.getElementById('btnRedo');
  btnU.disabled = _undoStack.length === 0;
  btnR.disabled = _redoStack.length === 0;
  btnU.textContent = _undoStack.length > 0 ? `↩ 戻す (${_undoStack.length})` : '↩ 戻す';
  btnR.textContent = _redoStack.length > 0 ? `↪ 進む (${_redoStack.length})` : '↪ 進む';
  btnU.title = `元に戻す [Ctrl+Z]${_undoStack.length > 0 ? `  ×${_undoStack.length}` : ''}`;
  btnR.title = `やり直す [Ctrl+Y]${_redoStack.length > 0 ? `  ×${_redoStack.length}` : ''}`;
}

function _clearHistory() {
  _undoStack = [];
  _redoStack = [];
  _syncHistoryUI();
}

// ── Format Tabs ──
document.querySelectorAll('.format-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.format-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFormat = tab.dataset.format;
  });
});

// ── View Tabs ──
document.querySelectorAll('.view-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    if (parsedData !== null) render();
  });
});

// ── Parse & Render ──
function parseAndRender() {
  const input = document.getElementById('inputEditor').value.trim();
  if (!input) return;
  const isFromDrop = _parseFromDrop;
  _parseFromDrop = false;
  if (!isFromDrop) {
    _droppedFileName = null;  // reset only on manual parse
    updateFileLabel();
  }

  try {
    if (currentFormat === 'html') {
      parsedData = parseHTML(input);
    } else if (currentFormat === 'xml') {
      parsedData = parseXML(input);
    } else if (currentFormat === 'yaml') {
      parsedData = jsyaml.load(input);
    } else if (currentFormat === 'jsonl') {
      parsedData = parseJSONL(input);
    } else {
      parsedData = JSON.parse(input);
    }
    updateStats(parsedData, input);
    render();
    if (!isFromDrop) _clearHistory();  // ドロップ時は履歴を維持
    updateFileLabel();
  } catch (e) {
    document.getElementById('previewArea').innerHTML =
      `<div class="error-box">⚠ パースエラー\n\n${escapeHtml(e.message)}</div>`;
    document.getElementById('statKeys').textContent = '— キー';
    document.getElementById('statDepth').textContent = '深さ —';
    document.getElementById('statNodes').textContent = '— ノード';
    document.getElementById('statUnique').textContent = '— ユニーク';
    document.getElementById('statBytes').textContent = '— B';
  }
}

// ── JSON Lines Parser ──
function parseJSONL(input) {
  const lines = input.split('\n').filter(l => l.trim() !== '');
  if (lines.length === 0) throw new Error('空のJSON Linesデータです');
  return lines.map((line, i) => {
    try {
      return JSON.parse(line);
    } catch (e) {
      throw new Error(`行 ${i + 1}: ${e.message}`);
    }
  });
}

// ── XML Parser ──
function parseXML(xmlString) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlString, 'application/xml');
  const errorNode = doc.querySelector('parsererror');
  if (errorNode) {
    throw new Error(errorNode.textContent.split('\n')[0]);
  }
  return xmlNodeToObj(doc.documentElement);
}

function xmlNodeToObj(node) {
  const obj = {};

  // Attributes
  if (node.attributes && node.attributes.length > 0) {
    const attrs = {};
    for (let i = 0; i < node.attributes.length; i++) {
      const attr = node.attributes[i];
      attrs[attr.name] = autoType(attr.value);
    }
    obj['@attributes'] = attrs;
  }

  // Child elements
  const childMap = {};
  const childElements = [];
  for (let i = 0; i < node.childNodes.length; i++) {
    const child = node.childNodes[i];
    if (child.nodeType === 1) { // Element
      childElements.push(child);
      const name = child.nodeName;
      childMap[name] = (childMap[name] || 0) + 1;
    }
  }

  if (childElements.length === 0) {
    // Leaf node: text content
    const text = node.textContent.trim();
    if (Object.keys(obj).length === 0) {
      return autoType(text);
    }
    if (text) obj['#text'] = autoType(text);
    return obj;
  }

  for (const child of childElements) {
    const name = child.nodeName;
    const value = xmlNodeToObj(child);
    if (childMap[name] > 1) {
      // Multiple children with same tag → array
      if (!obj[name]) obj[name] = [];
      obj[name].push(value);
    } else {
      obj[name] = value;
    }
  }

  // Wrap root in tag name
  return obj;
}

function autoType(val) {
  if (val === 'true') return true;
  if (val === 'false') return false;
  if (val === 'null') return null;
  if (val !== '' && !isNaN(Number(val))) return Number(val);
  return val;
}

// ── HTML Parser ──
function parseHTML(htmlString) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(htmlString, 'text/html');
  // Find root: if <html> has meaningful content, use it; otherwise try <body>
  const html = doc.documentElement;
  const body = doc.body;
  const head = doc.head;

  const result = {};
  if (head && head.childNodes.length > 0) {
    result.head = htmlNodeToObj(head);
  }
  if (body && body.childNodes.length > 0) {
    result.body = htmlNodeToObj(body);
  }

  // If only body has content and it's simple, unwrap
  if (!result.head && result.body) {
    return { html: result.body };
  }
  return { html: result };
}

function htmlNodeToObj(node) {
  const obj = {};

  // Attributes
  if (node.attributes && node.attributes.length > 0) {
    const attrs = {};
    for (let i = 0; i < node.attributes.length; i++) {
      const attr = node.attributes[i];
      attrs[attr.name] = attr.value;
    }
    obj['@attributes'] = attrs;
  }

  // Child elements
  const childMap = {};
  const childElements = [];
  for (let i = 0; i < node.childNodes.length; i++) {
    const child = node.childNodes[i];
    if (child.nodeType === 1) { // Element
      childElements.push(child);
      const name = child.nodeName.toLowerCase();
      childMap[name] = (childMap[name] || 0) + 1;
    }
  }

  if (childElements.length === 0) {
    const text = node.textContent.trim();
    if (Object.keys(obj).length === 0) {
      return text || '';
    }
    if (text) obj['#text'] = text;
    return obj;
  }

  for (const child of childElements) {
    const name = child.nodeName.toLowerCase();
    const value = htmlNodeToObj(child);
    if (childMap[name] > 1) {
      if (!obj[name]) obj[name] = [];
      obj[name].push(value);
    } else {
      obj[name] = value;
    }
  }

  return obj;
}

function render() {
  const area = document.getElementById('previewArea');
  if (currentView === 'tree') {
    area.innerHTML = '';
    area.appendChild(buildTree(parsedData, null, true, []));
  } else {
    area.innerHTML = buildTable(parsedData);
  }
}

// ── Tree View ──
function buildTree(data, key, isRoot, path) {
  path = path || [];
  const node = document.createElement('div');
  node.className = 'tree-node';
  node._dndPath = path;

  const type = getType(data);
  const isContainer = (type === 'object' || type === 'array');

  // ─ Build item row ─
  const item = document.createElement('div');
  item.className = 'tree-item';

  // Drag grip (non-root only)
  if (path.length > 0) {
    const grip = document.createElement('span');
    grip.className = 'drag-grip';
    grip.textContent = '⠿';
    grip.title = 'ドラッグして移動';
    grip.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      node.draggable = true;
    });
    item.appendChild(grip);
  } else {
    // placeholder so layout stays consistent
    const ph = document.createElement('span');
    ph.style.width = '14px';
    ph.style.flexShrink = '0';
    ph.style.display = 'inline-block';
    item.appendChild(ph);
  }

  if (isContainer) {
    const toggle = document.createElement('span');
    toggle.className = 'tree-toggle open';
    toggle.textContent = '▶';
    item.appendChild(toggle);

    if (key !== null) {
      const keyEl = document.createElement('span');
      keyEl.className = 'tree-key';
      keyEl.textContent = key;
      item.appendChild(keyEl);
      const colon = document.createElement('span');
      colon.className = 'tree-colon';
      colon.textContent = ':';
      item.appendChild(colon);
    }

    const badge = document.createElement('span');
    badge.className = `tree-type-badge ${type}`;
    const entries = type === 'array' ? data.length : Object.keys(data).length;
    badge.textContent = type === 'array' ? `配列 (${entries})` : `オブジェクト (${entries})`;
    item.appendChild(badge);

    const addBtn = document.createElement('button');
    addBtn.className = 'tree-add-btn';
    addBtn.textContent = '＋ 追加';
    addBtn.title = type === 'array' ? '配列に項目を追加' : 'オブジェクトにキーを追加';
    const capturedAddPath = [...path];
    addBtn.addEventListener('click', (e) => { e.stopPropagation(); showAddDialog(capturedAddPath, type); });
    item.appendChild(addBtn);

    if (path.length > 0) {
      const delBtn = document.createElement('button');
      delBtn.className = 'tree-del-btn';
      delBtn.textContent = '✕ 削除';
      delBtn.title = 'この項目を削除';
      delBtn.addEventListener('click', (e) => { e.stopPropagation(); showDelDialog(capturedAddPath); });
      item.appendChild(delBtn);
    }

    node.appendChild(item);

    const children = document.createElement('div');
    children.className = 'tree-children';
    if (type === 'array') {
      data.forEach((val, i) => children.appendChild(buildTree(val, i, false, [...path, i])));
    } else {
      Object.entries(data).forEach(([k, v]) => children.appendChild(buildTree(v, k, false, [...path, k])));
    }
    node.appendChild(children);

    toggle.addEventListener('click', () => { toggle.classList.toggle('open'); children.classList.toggle('collapsed'); });

  } else {
    const toggle = document.createElement('span');
    toggle.className = 'tree-toggle invisible';
    toggle.textContent = '▶';
    item.appendChild(toggle);

    if (key !== null) {
      const keyEl = document.createElement('span');
      keyEl.className = 'tree-key';
      keyEl.textContent = key;
      item.appendChild(keyEl);
      const colon = document.createElement('span');
      colon.className = 'tree-colon';
      colon.textContent = ':';
      item.appendChild(colon);
    }

    const valEl = document.createElement('span');
    valEl.className = `tree-value ${type}`;
    if (type === 'string') {
      valEl.textContent = `"${data}"`;
    } else if (type === 'boolean') {
      valEl.textContent = String(data);
      const check = document.createElement('span');
      check.className = data ? 'bool-check' : 'bool-cross';
      check.textContent = data ? ' ✓' : ' ✗';
      valEl.appendChild(check);
    } else if (type === 'null') {
      valEl.textContent = 'null';
    } else {
      valEl.textContent = String(data);
    }
    item.appendChild(valEl);

    const badge = document.createElement('span');
    badge.className = `tree-type-badge ${type}`;
    const typeLabels = { string: '文字列', number: '数値', boolean: '真偽値', null: 'null' };
    badge.textContent = typeLabels[type] || type;
    item.appendChild(badge);

    if (path.length > 0) {
      const capturedPath = [...path];
      const editBtn = document.createElement('button');
      editBtn.className = 'tree-edit-btn';
      editBtn.textContent = '✎ 編集';
      editBtn.title = 'この値を編集';
      editBtn.addEventListener('click', (e) => { e.stopPropagation(); showEditDialog(capturedPath, data, type); });
      item.appendChild(editBtn);

      const delBtn = document.createElement('button');
      delBtn.className = 'tree-del-btn';
      delBtn.textContent = '✕ 削除';
      delBtn.title = 'この項目を削除';
      delBtn.addEventListener('click', (e) => { e.stopPropagation(); showDelDialog(capturedPath); });
      item.appendChild(delBtn);
    }

    node.appendChild(item);
  }

  // ─ DnD event bindings ─
  // dragstart: only when draggable was enabled via grip mousedown
  node.addEventListener('dragstart', (e) => {
    e.stopPropagation();
    _dndSrcPath = [...path];
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('application/json-dnd', '1');
    node.classList.add('dnd-dragging');
  });

  node.addEventListener('dragend', () => {
    node.draggable = false;
    node.classList.remove('dnd-dragging');
    _clearTreeDnD();
  });

  // dragenter / dragover: show drop indicator
  node.addEventListener('dragenter', (e) => { e.stopPropagation(); e.preventDefault(); });

  node.addEventListener('dragover', (e) => {
    e.stopPropagation();
    if (_dndSrcPath === null) return;
    if (isDescendantOrSelf(_dndSrcPath, path)) { e.dataTransfer.dropEffect = 'none'; return; }
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';

    _clearTreeDnD(node);
    const zone = _dndZone(item, e.clientY, isContainer, path.length === 0);
    node.classList.add('dnd-' + zone);
  });

  node.addEventListener('dragleave', (e) => {
    e.stopPropagation();
    if (!node.contains(e.relatedTarget)) {
      node.classList.remove('dnd-before', 'dnd-after', 'dnd-into');
    }
  });

  node.addEventListener('drop', (e) => {
    e.stopPropagation();
    e.preventDefault();
    node.classList.remove('dnd-before', 'dnd-after', 'dnd-into');
    if (_dndSrcPath === null) return;
    if (isDescendantOrSelf(_dndSrcPath, path)) return;

    const zone = _dndZone(item, e.clientY, isContainer, path.length === 0);
    const srcPath = [..._dndSrcPath];
    _dndSrcPath = null;
    pushHistory();
    moveItem(srcPath, path, zone);
    updateStats(parsedData, null);
    syncEditorFromParsedData();
    render();
    showToast('↕ 移動しました');
  });

  return node;
}

// ── Table View ──
let _tableRows = [];

function buildTable(data) {
  _tableRows = [];
  const rootType = getType(data);

  if (rootType === 'object' || rootType === 'array') {
    const rootCount = rootType === 'array' ? data.length : Object.keys(data).length;
    _tableRows.push({ path: '(ルート)', pathArr: [], key: '(ルート)', value: rootType === 'array' ? `[${rootCount}]` : `{${rootCount}}`, rawValue: data, type: rootType });
  }

  flattenForTable(data, '', [], _tableRows);

  const typeLabels = { string: '文字列', number: '数値', boolean: '真偽値', null: 'null', object: 'オブジェクト', array: '配列' };

  let html = `<div class="table-wrap"><table class="data-table">
    <thead><tr>
      <th class="drag-col"></th>
      <th>パス</th>
      <th>キー</th>
      <th>値</th>
      <th>型</th>
      <th>操作</th>
    </tr></thead><tbody>`;

  _tableRows.forEach((r, idx) => {
    const typeBadge = `<span class="tree-type-badge ${r.type}">${typeLabels[r.type] || r.type}</span>`;
    const displayVal = r.type === 'string' ? `"${escapeHtml(String(r.value))}"` : escapeHtml(String(r.value));
    const isContainer = r.type === 'object' || r.type === 'array';
    const draggable  = r.pathArr.length > 0 ? ' data-draggable="1"' : '';

    const grip    = r.pathArr.length > 0 ? `<span class="drag-grip" title="ドラッグして移動">⠿</span>` : '';
    const editBtn = !isContainer ? `<button class="table-action-btn edit" data-rowidx="${idx}">✎ 編集</button>` : '';
    const addBtn  = isContainer  ? `<button class="table-action-btn add"  data-rowidx="${idx}">＋ 追加</button>` : '';
    const delBtn  = r.pathArr.length > 0 ? `<button class="table-action-btn del"  data-rowidx="${idx}">✕ 削除</button>` : '';

    html += `<tr data-rowidx="${idx}"${draggable}>
      <td class="drag-col">${grip}</td>
      <td class="path-cell">${escapeHtml(r.path)}</td>
      <td>${escapeHtml(r.key)}</td>
      <td><span class="tree-value ${r.type}">${displayVal}</span></td>
      <td class="type-cell">${typeBadge}</td>
      <td class="action-cell">${editBtn}${addBtn}${delBtn}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  return html;
}

function flattenForTable(data, pathStr, pathArr, rows) {
  const type = getType(data);
  if (type === 'object') {
    Object.entries(data).forEach(([k, v]) => {
      const p  = pathStr ? `${pathStr}.${k}` : k;
      const pa = [...pathArr, k];
      const t  = getType(v);
      if (t === 'object' || t === 'array') {
        const cnt = t === 'array' ? v.length : Object.keys(v).length;
        rows.push({ path: p, pathArr: pa, key: k, value: t === 'array' ? `[${cnt}]` : `{${cnt}}`, rawValue: v, type: t });
        flattenForTable(v, p, pa, rows);
      } else {
        rows.push({ path: p, pathArr: pa, key: k, value: v === null ? 'null' : v, rawValue: v, type: t });
      }
    });
  } else if (type === 'array') {
    data.forEach((v, i) => {
      const p  = `${pathStr}[${i}]`;
      const pa = [...pathArr, i];
      const t  = getType(v);
      if (t === 'object' || t === 'array') {
        const cnt = t === 'array' ? v.length : Object.keys(v).length;
        rows.push({ path: p, pathArr: pa, key: `[${i}]`, value: t === 'array' ? `[${cnt}]` : `{${cnt}}`, rawValue: v, type: t });
        flattenForTable(v, p, pa, rows);
      } else {
        rows.push({ path: p, pathArr: pa, key: `[${i}]`, value: v === null ? 'null' : v, rawValue: v, type: t });
      }
    });
  }
}

// ── Helpers ──
function getType(val) {
  if (val === null || val === undefined) return 'null';
  if (Array.isArray(val)) return 'array';
  return typeof val;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function countKeys(data) {
  let count = 0;
  if (data && typeof data === 'object') {
    const entries = Array.isArray(data) ? data : Object.values(data);
    count += Array.isArray(data) ? 0 : Object.keys(data).length;
    entries.forEach(v => { count += countKeys(v); });
  }
  return count;
}

function maxDepth(data, d) {
  d = d || 0;
  if (data && typeof data === 'object') {
    const entries = Array.isArray(data) ? data : Object.values(data);
    let max = d + 1;
    entries.forEach(v => { max = Math.max(max, maxDepth(v, d + 1)); });
    return max;
  }
  return d;
}

function updateStats(data, rawInput) {
  document.getElementById('statKeys').textContent = `${countKeys(data)} キー`;
  document.getElementById('statDepth').textContent = `深さ ${maxDepth(data)}`;
  document.getElementById('statNodes').textContent = `${countNodes(data)} ノード`;
  const ukeys = new Set();
  collectUniqueKeys(data, ukeys);
  document.getElementById('statUnique').textContent = `${ukeys.size} ユニーク`;
  const bytes = rawInput ? new Blob([rawInput]).size : new Blob([JSON.stringify(data)]).size;
  document.getElementById('statBytes').textContent = formatBytes(bytes);
}

function countNodes(data) {
  let count = 1; // count self
  if (data && typeof data === 'object') {
    const entries = Array.isArray(data) ? data : Object.values(data);
    entries.forEach(v => { count += countNodes(v); });
  }
  return count;
}

function collectUniqueKeys(data, set) {
  if (data && typeof data === 'object') {
    if (Array.isArray(data)) {
      data.forEach(v => collectUniqueKeys(v, set));
    } else {
      Object.keys(data).forEach(k => {
        set.add(k);
        collectUniqueKeys(data[k], set);
      });
    }
  }
}

function formatBytes(bytes) {
  if (bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  const val = bytes / Math.pow(1024, i);
  return `${val < 10 && i > 0 ? val.toFixed(1) : Math.round(val)} ${units[i]}`;
}

// ── Format ──
function formatInput() {
  const editor = document.getElementById('inputEditor');
  const input = editor.value.trim();
  if (!input) return;
  try {
    let obj;
    if (currentFormat === 'html') {
      editor.value = formatHtmlString(input);
    } else if (currentFormat === 'xml') {
      // Pretty-print XML using DOMParser + XMLSerializer
      const parser = new DOMParser();
      const doc = parser.parseFromString(input, 'application/xml');
      if (doc.querySelector('parsererror')) return;
      editor.value = formatXmlString(input);
    } else if (currentFormat === 'yaml') {
      obj = jsyaml.load(input);
      editor.value = jsyaml.dump(obj, { indent: 2 });
    } else if (currentFormat === 'jsonl') {
      const arr = parseJSONL(input);
      editor.value = arr.map(item => JSON.stringify(item)).join('\n');
    } else {
      obj = JSON.parse(input);
      editor.value = JSON.stringify(obj, null, 2);
    }
  } catch (e) {
    // ignore
  }
}

function formatXmlString(xml) {
  let formatted = '';
  let indent = '';
  const tab = '  ';
  xml.split(/>\s*</).forEach((node, i) => {
    if (node.match(/^\/\w/)) indent = indent.substring(tab.length);
    formatted += (i > 0 ? '\n' : '') + indent + '<' + node + '>';
    if (!node.match(/^\//) && !node.match(/\/\s*$/) && !node.match(/<\//)) {
      indent += tab;
    }
  });
  return formatted.replace(/^</, '<').replace(/>$/, '>').replace(/<>/g, '').replace(/<\/>/g, '');
}

function formatHtmlString(html) {
  // Simple HTML indenter
  let formatted = '';
  let indent = '';
  const tab = '  ';
  // Split on tags
  const tokens = html.replace(/>\s*</g, '>\n<').split('\n');
  tokens.forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) return;
    if (trimmed.startsWith('</')) {
      indent = indent.substring(tab.length);
      formatted += indent + trimmed + '\n';
    } else if (trimmed.match(/<[^/!][^>]*[^/]>/) && !trimmed.match(/<(br|hr|img|input|meta|link)\b/i)) {
      formatted += indent + trimmed + '\n';
      if (!trimmed.match(/<\/[^>]+>\s*$/)) {
        indent += tab;
      }
    } else {
      formatted += indent + trimmed + '\n';
    }
  });
  return formatted.trim();
}

const resizeHandle = document.getElementById('resizeHandle');
const panelLeft = document.getElementById('panelLeft');
let isResizing = false;

resizeHandle.addEventListener('mousedown', (e) => {
  isResizing = true;
  resizeHandle.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const newWidth = e.clientX;
  const min = 250, max = window.innerWidth - 300;
  if (newWidth >= min && newWidth <= max) {
    panelLeft.style.width = newWidth + 'px';
  }
});

document.addEventListener('mouseup', () => {
  if (isResizing) {
    isResizing = false;
    resizeHandle.classList.remove('dragging');

    document.body.style.userSelect = '';

});

  }
});

// ── Auto-detect format ──
document.getElementById('inputEditor').addEventListener('input', () => {
  const val = document.getElementById('inputEditor').value.trimStart();
  const valLower = val.toLowerCase();
  let detected = null;
  if (valLower.startsWith('<!doctype html') || valLower.startsWith('<html') || valLower.startsWith('<body') || valLower.startsWith('<div') || valLower.startsWith('<head')) {
    detected = 'html';
  } else if (val.startsWith('<')) {
    detected = 'xml';
  } else if (val.startsWith('{') || val.startsWith('[')) {
    // Detect JSONL: multiple lines each starting with { (and not a single JSON object/array)
    const lines = val.split('\n').filter(l => l.trim() !== '');
    if (lines.length > 1 && val.startsWith('{') && lines.every(l => l.trim().startsWith('{'))) {
      detected = 'jsonl';
    } else {
      detected = 'json';
    }
  } else if (val) {
    detected = 'yaml';
  }
  if (detected && currentFormat !== detected) {
    currentFormat = detected;
    document.querySelectorAll('.format-tab').forEach(t => t.classList.toggle('active', t.dataset.format === detected));
  }
});

// ── File Drop ──
const editorWrap = document.getElementById('editorWrap');

editorWrap.addEventListener('dragover', (e) => {
  e.preventDefault();
  e.stopPropagation();
  editorWrap.classList.add('drag-over');
});

editorWrap.addEventListener('dragleave', (e) => {
  if (!editorWrap.contains(e.relatedTarget)) {
    editorWrap.classList.remove('drag-over');
  }
});

editorWrap.addEventListener('drop', (e) => {
  e.preventDefault();
  e.stopPropagation();
  editorWrap.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file) return;

  const ext = file.name.split('.').pop().toLowerCase();
  let fmt = 'json';
  if (ext === 'jsonl' || ext === 'ndjson') fmt = 'jsonl';
  else if (ext === 'yaml' || ext === 'yml') fmt = 'yaml';
  else if (ext === 'xml') fmt = 'xml';
  else if (ext === 'html' || ext === 'htm') fmt = 'html';

  const reader = new FileReader();
  reader.onload = (ev) => {
    pushHistory();  // 現在の状態を保存してからドロップファイルを読み込む
    document.getElementById('inputEditor').value = ev.target.result;
    if (currentFormat !== fmt) {
      currentFormat = fmt;
      document.querySelectorAll('.format-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.format === fmt)
      );
    }
    // Store base name (without extension) for use as export filename
    _droppedFileName = file.name.replace(/\.[^.]+$/, '');
    _parseFromDrop = true;
    updateFileLabel();
    parseAndRender();
    showToast(`📂 ${file.name} を読み込みました`);
  };
  reader.readAsText(file);
});

async function exportFile() {
  const content = document.getElementById('inputEditor').value;
  if (!content.trim()) {
    showToast('⚠ 書き出す内容がありません', true);
    return;
  }
  const extMap  = { json: 'json', jsonl: 'jsonl', yaml: 'yaml', xml: 'xml', html: 'html' };
  const mimeMap = { json: 'application/json', jsonl: 'application/x-ndjson', yaml: 'text/yaml', xml: 'application/xml', html: 'text/html' };
  const ext  = extMap[currentFormat]  || 'txt';
  const mime = mimeMap[currentFormat] || 'text/plain';

  // Default filename: dropped file name  OR  current datetime
  const baseName = _droppedFileName
    ? _droppedFileName
    : (() => {
        const d = new Date();
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`
             + `_${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
      })();
  const suggestedName = `${baseName}.${ext}`;

  if ('showSaveFilePicker' in window) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName,
        types: [{
          description: ext.toUpperCase() + ' ファイル',
          accept: { [mime]: ['.' + ext] }
        }]
      });
      const writable = await handle.createWritable();
      await writable.write(content);
      await writable.close();
      showToast(`💾 保存しました`);
      return;
    } catch (err) {
      if (err.name === 'AbortError') return; // user cancelled
      // fall through to blob download
    }
  }
  // Fallback: blob download
  const blob = new Blob([content], { type: mime + ';charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = suggestedName;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`💾 ${suggestedName} を書き出しました`);
}

// ── Edit Dialog ──
let _editPath = [];

function showEditDialog(path, currentValue, currentType) {
  _editPath = path;
  const pathLabel = path.map(p => (typeof p === 'number' ? `[${p}]` : p)).join(' › ');
  document.getElementById('editDialogPath').textContent = pathLabel;

  const typeSelect = document.getElementById('editType');
  typeSelect.value = currentType;

  document.getElementById('editValueInput').value =
    currentType === 'null' ? '' :
    currentType === 'string' ? currentValue :
    String(currentValue);

  document.getElementById('editBoolSelect').value = String(currentValue);

  onEditTypeChange();

  document.getElementById('editDialogBackdrop').classList.add('visible');

  // Focus input
  setTimeout(() => {
    const inp = document.getElementById('editType').value === 'boolean'
      ? document.getElementById('editBoolSelect')
      : document.getElementById('editValueInput');
    inp.focus();
    if (inp.select) inp.select();
  }, 50);
}

function onEditTypeChange() {
  const type = document.getElementById('editType').value;
  const valField  = document.getElementById('editValueField');
  const boolField = document.getElementById('editBoolField');
  const inp       = document.getElementById('editValueInput');

  if (type === 'boolean') {
    valField.style.display  = 'none';
    boolField.style.display = '';
  } else if (type === 'null') {
    valField.style.display  = '';
    boolField.style.display = 'none';
    inp.value    = '';
    inp.disabled = true;
    inp.placeholder = 'null';
  } else {
    valField.style.display  = '';
    boolField.style.display = 'none';
    inp.disabled    = false;
    inp.placeholder = type === 'number' ? '数値を入力...' : '値を入力...';
  }
}

function closeEditDialog() {
  document.getElementById('editDialogBackdrop').classList.remove('visible');
}

function confirmEdit() {
  const type   = document.getElementById('editType').value;
  const rawVal = document.getElementById('editValueInput').value;

  let newValue;
  if (type === 'null') {
    newValue = null;
  } else if (type === 'boolean') {
    newValue = document.getElementById('editBoolSelect').value === 'true';
  } else if (type === 'number') {
    newValue = Number(rawVal);
    if (rawVal.trim() === '' || isNaN(newValue)) {
      document.getElementById('editValueInput').style.borderColor = 'var(--accent-red)';
      document.getElementById('editValueInput').focus();
      setTimeout(() => {
        document.getElementById('editValueInput').style.borderColor = '';
      }, 1200);
      return;
    }
  } else {
    newValue = rawVal;
  }

  pushHistory();
  setNestedValue(parsedData, _editPath, newValue);
  updateStats(parsedData, null);
  syncEditorFromParsedData();
  render();
  closeEditDialog();
  showToast('✓ 値を更新しました');
}

// Close dialog on backdrop click
document.getElementById('editDialogBackdrop').addEventListener('click', (e) => {
  if (e.target === document.getElementById('editDialogBackdrop')) closeEditDialog();
});

// ── Table click delegation ──
document.getElementById('previewArea').addEventListener('click', (e) => {
  const editBtn = e.target.closest('.table-action-btn.edit');
  const addBtn  = e.target.closest('.table-action-btn.add');
  const delBtn  = e.target.closest('.table-action-btn.del');
  if (editBtn) {
    const r = _tableRows[parseInt(editBtn.dataset.rowidx)];
    if (!r) return;
    const val = r.type === 'null' ? null : r.rawValue;
    showEditDialog(r.pathArr, val, r.type);
  } else if (addBtn) {
    const r = _tableRows[parseInt(addBtn.dataset.rowidx)];
    if (!r) return;
    showAddDialog(r.pathArr, r.type);
  } else if (delBtn) {
    const r = _tableRows[parseInt(delBtn.dataset.rowidx)];
    if (!r) return;
    showDelDialog(r.pathArr);
  }
});

// ── Add Dialog ──
let _addPath       = [];
let _addParentType = 'object';

function showAddDialog(path, parentType) {
  _addPath       = path;
  _addParentType = parentType;

  const pathLabel = path.length === 0 ? '(ルート)'
    : path.map(p => (typeof p === 'number' ? `[${p}]` : p)).join(' › ');
  document.getElementById('addDialogPath').textContent = pathLabel;
  document.getElementById('addDialogTitle').textContent =
    parentType === 'array' ? '＋ 配列に項目を追加' : '＋ オブジェクトにキーを追加';

  // Show key field only for objects
  document.getElementById('addKeyField').style.display = parentType === 'array' ? 'none' : '';
  document.getElementById('addKeyInput').value = '';

  document.getElementById('addType').value = 'string';
  document.getElementById('addValueInput').value = '';
  document.getElementById('addValueInput').disabled = false;
  document.getElementById('addValueInput').placeholder = '値を入力...';
  document.getElementById('addValueField').style.display = '';
  document.getElementById('addBoolField').style.display = 'none';

  document.getElementById('addDialogBackdrop').classList.add('visible');

  setTimeout(() => {
    const target = parentType === 'array'
      ? document.getElementById('addValueInput')
      : document.getElementById('addKeyInput');
    target.focus();
  }, 50);
}

function onAddTypeChange() {
  const type = document.getElementById('addType').value;
  const valField  = document.getElementById('addValueField');
  const boolField = document.getElementById('addBoolField');
  const inp       = document.getElementById('addValueInput');

  if (type === 'boolean') {
    valField.style.display  = 'none';
    boolField.style.display = '';
  } else if (type === 'null' || type === 'object' || type === 'array') {
    valField.style.display  = '';
    boolField.style.display = 'none';
    inp.value    = type === 'null' ? '' : (type === 'object' ? '{}' : '[]');
    inp.disabled = true;
    inp.placeholder = type === 'null' ? 'null' : (type === 'object' ? '空のオブジェクト {}' : '空の配列 []');
  } else {
    valField.style.display  = '';
    boolField.style.display = 'none';
    inp.disabled    = false;
    inp.placeholder = type === 'number' ? '数値を入力...' : '値を入力...';
    if (type === 'number' && inp.value === '{}' || inp.value === '[]') inp.value = '';
  }
}

function closeAddDialog() {
  document.getElementById('addDialogBackdrop').classList.remove('visible');
}

function confirmAdd() {
  const type   = document.getElementById('addType').value;
  const keyRaw = document.getElementById('addKeyInput').value.trim();
  const rawVal = document.getElementById('addValueInput').value;

  // Key validation for objects
  if (_addParentType === 'object' && !keyRaw) {
    const ki = document.getElementById('addKeyInput');
    ki.style.borderColor = 'var(--accent-red)';
    ki.focus();
    setTimeout(() => { ki.style.borderColor = ''; }, 1200);
    return;
  }

  let newValue;
  if (type === 'null')    newValue = null;
  else if (type === 'object') newValue = {};
  else if (type === 'array')  newValue = [];
  else if (type === 'boolean') newValue = document.getElementById('addBoolSelect').value === 'true';
  else if (type === 'number') {
    newValue = Number(rawVal);
    if (rawVal.trim() === '' || isNaN(newValue)) {
      const vi = document.getElementById('addValueInput');
      vi.style.borderColor = 'var(--accent-red)';
      vi.focus();
      setTimeout(() => { vi.style.borderColor = ''; }, 1200);
      return;
    }
  } else {
    newValue = rawVal;
  }

  // Navigate to parent container
  let parent = parsedData;
  for (const p of _addPath) parent = parent[p];

  pushHistory();
  if (_addParentType === 'array') {
    parent.push(newValue);
  } else {
    // Check for duplicate key
    if (Object.prototype.hasOwnProperty.call(parent, keyRaw)) {
      const ki = document.getElementById('addKeyInput');
      ki.style.borderColor = 'var(--accent-orange)';
      ki.title = '既にこのキーは存在します';
      ki.focus();
      setTimeout(() => { ki.style.borderColor = ''; ki.title = ''; }, 1800);
      return;
    }
    parent[keyRaw] = newValue;
  }

  updateStats(parsedData, null);
  syncEditorFromParsedData();
  render();
  closeAddDialog();
  const label = _addParentType === 'array' ? `[${parent.length - 1}]` : keyRaw;
  showToast(`＋ "${label}" を追加しました`);
}

// Close add dialog on backdrop / Escape
document.getElementById('addDialogBackdrop').addEventListener('click', (e) => {
  if (e.target === document.getElementById('addDialogBackdrop')) closeAddDialog();
});

// ── Delete Dialog ──
let _delPath = [];

function showDelDialog(path) {
  _delPath = path;
  const pathLabel = path.map(p => (typeof p === 'number' ? `[${p}]` : p)).join(' › ');
  document.getElementById('delDialogPath').textContent = pathLabel;
  document.getElementById('delDialogBackdrop').classList.add('visible');
}

function closeDelDialog() {
  document.getElementById('delDialogBackdrop').classList.remove('visible');
}

function confirmDel() {
  if (!_delPath || _delPath.length === 0) { closeDelDialog(); return; }
  const key = _delPath[_delPath.length - 1];
  const parentPath = _delPath.slice(0, -1);

  let parent = parsedData;
  for (const p of parentPath) parent = parent[p];

  pushHistory();
  if (Array.isArray(parent)) {
    parent.splice(key, 1);
  } else {
    delete parent[key];
  }

  updateStats(parsedData, null);
  syncEditorFromParsedData();
  render();
  closeDelDialog();
  const label = typeof key === 'number' ? `[${key}]` : key;
  showToast(`🗑 "${label}" を削除しました`, false, true);
}

document.getElementById('delDialogBackdrop').addEventListener('click', (e) => {
  if (e.target === document.getElementById('delDialogBackdrop')) closeDelDialog();
});

document.addEventListener('keydown', (e) => {
  // Undo: Ctrl+Z
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') {
    if (!document.activeElement || document.activeElement.tagName !== 'TEXTAREA' || document.activeElement.id !== 'inputEditor') {
      e.preventDefault();
      undo();
    }
    return;
  }
  // Redo: Ctrl+Y or Ctrl+Shift+Z
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) {
    if (!document.activeElement || document.activeElement.tagName !== 'TEXTAREA' || document.activeElement.id !== 'inputEditor') {
      e.preventDefault();
      redo();
    }
    return;
  }
  if (e.key === 'Escape') {
    closeEditDialog();
    closeAddDialog();
    closeDelDialog();
  }
});

function setNestedValue(obj, path, value) {
  if (!path || path.length === 0) return;
  let curr = obj;
  for (let i = 0; i < path.length - 1; i++) {
    curr = curr[path[i]];
  }
  curr[path[path.length - 1]] = value;
}

function syncEditorFromParsedData() {
  if (!parsedData) return;
  try {
    if (currentFormat === 'json') {
      document.getElementById('inputEditor').value = JSON.stringify(parsedData, null, 2);
    } else if (currentFormat === 'jsonl') {
      if (Array.isArray(parsedData)) {
        document.getElementById('inputEditor').value = parsedData.map(item => JSON.stringify(item)).join('\n');
      }
    } else if (currentFormat === 'yaml') {
      document.getElementById('inputEditor').value = jsyaml.dump(parsedData, { indent: 2 });
    }
    // XML/HTML: tree edit reflected in parsedData only (re-serialization is complex)
  } catch (e) { /* ignore */ }
}

// ══════════════════════════════════════════════
// ── Drag-and-Drop Engine ──
// ══════════════════════════════════════════════

let _dndSrcPath = null;  // path array of item being dragged

// Compute drop zone ('before'|'after'|'into') from mouse Y
function _dndZone(itemEl, clientY, isContainer, isRoot) {
  if (isRoot) return 'into';
  const rect = itemEl.getBoundingClientRect();
  const ratio = (clientY - rect.top) / rect.height;
  if (isContainer) {
    if (ratio < 0.30) return 'before';
    if (ratio > 0.70) return 'after';
    return 'into';
  }
  return ratio < 0.5 ? 'before' : 'after';
}

// Remove all DnD indicator classes from tree nodes except the given node
function _clearTreeDnD(exceptNode) {
  document.querySelectorAll('.tree-node.dnd-before,.tree-node.dnd-after,.tree-node.dnd-into').forEach(el => {
    if (el !== exceptNode) el.classList.remove('dnd-before', 'dnd-after', 'dnd-into');
  });
  if (!exceptNode) {
    document.querySelectorAll('.tree-node.dnd-dragging').forEach(el => el.classList.remove('dnd-dragging'));
  }
}

// ── Shared path helpers ──
function getNestedAt(data, path) {
  let curr = data;
  for (const key of path) curr = curr[key];
  return curr;
}

function isDescendantOrSelf(srcPath, testPath) {
  if (testPath.length < srcPath.length) return false;
  for (let i = 0; i < srcPath.length; i++) {
    if (String(srcPath[i]) !== String(testPath[i])) return false;
  }
  return true;
}

// ── Core move operation ──
// position: 'before' | 'after' | 'into'
// srcPath: path of item to move
// dstPath: path of target (sibling position or container to move into)
function moveItem(srcPath, dstPath, position) {
  if (!srcPath || srcPath.length === 0) return;
  if (isDescendantOrSelf(srcPath, dstPath)) return;

  const srcParentPath = srcPath.slice(0, -1);
  const srcKey = srcPath[srcPath.length - 1];
  const srcParent = getNestedAt(parsedData, srcParentPath);
  const srcValue = Array.isArray(srcParent) ? srcParent[srcKey] : srcParent[String(srcKey)];

  // ── DROP INTO container ──
  if (position === 'into') {
    const dst = getNestedAt(parsedData, dstPath);
    // Remove from source
    if (Array.isArray(srcParent)) srcParent.splice(Number(srcKey), 1);
    else delete srcParent[String(srcKey)];
    // Insert into destination
    if (Array.isArray(dst)) {
      dst.push(srcValue);
    } else {
      let key = String(srcKey);
      if (Object.prototype.hasOwnProperty.call(dst, key)) {
        let n = 1;
        while (Object.prototype.hasOwnProperty.call(dst, key + '_' + n)) n++;
        key += '_' + n;
      }
      dst[key] = srcValue;
    }
    return;
  }

  // ── DROP BEFORE / AFTER sibling ──
  const dstParentPath = dstPath.slice(0, -1);
  const dstKey = dstPath[dstPath.length - 1];
  let dstParent = getNestedAt(parsedData, dstParentPath);

  const sameParent = srcParentPath.length === dstParentPath.length &&
    srcParentPath.every((k, i) => String(k) === String(dstParentPath[i]));

  if (Array.isArray(dstParent)) {
    // ── Array parent ──
    const srcIdx = Number(srcKey);
    let dstIdx = Number(dstKey);
    const insertIdx = position === 'after' ? dstIdx + 1 : dstIdx;

    if (sameParent) {
      srcParent.splice(srcIdx, 1);
      const adjusted = srcIdx < insertIdx ? insertIdx - 1 : insertIdx;
      srcParent.splice(adjusted, 0, srcValue);
    } else {
      if (Array.isArray(srcParent)) srcParent.splice(srcIdx, 1);
      else delete srcParent[String(srcKey)];
      // Re-fetch in case path indices shifted
      dstParent = getNestedAt(parsedData, dstParentPath);
      const safeIdx = Math.min(insertIdx, dstParent.length);
      dstParent.splice(safeIdx, 0, srcValue);
    }

  } else {
    // ── Object parent ──
    const strSrcKey = String(srcKey);
    const strDstKey = String(dstKey);

    if (sameParent) {
      // Reorder keys within same object
      const entries = Object.entries(dstParent);
      const fromIdx = entries.findIndex(([k]) => k === strSrcKey);
      if (fromIdx === -1) return;
      entries.splice(fromIdx, 1);
      let toIdx = entries.findIndex(([k]) => k === strDstKey);
      if (toIdx === -1) toIdx = entries.length;
      else if (position === 'after') toIdx++;
      entries.splice(toIdx, 0, [strSrcKey, srcValue]);
      Object.keys(dstParent).forEach(k => delete dstParent[k]);
      entries.forEach(([k, v]) => { dstParent[k] = v; });

    } else {
      // Cross-parent insertion into object
      let insertKey = strSrcKey;
      if (Object.prototype.hasOwnProperty.call(dstParent, insertKey)) {
        let n = 1;
        while (Object.prototype.hasOwnProperty.call(dstParent, insertKey + '_' + n)) n++;
        insertKey += '_' + n;
      }
      // Remove from source
      if (Array.isArray(srcParent)) srcParent.splice(Number(srcKey), 1);
      else delete srcParent[strSrcKey];

      // Rebuild dstParent with insertion
      const entries = Object.entries(dstParent);
      let toIdx = entries.findIndex(([k]) => k === strDstKey);
      if (toIdx === -1) toIdx = entries.length;
      else if (position === 'after') toIdx++;
      entries.splice(toIdx, 0, [insertKey, srcValue]);
      Object.keys(dstParent).forEach(k => delete dstParent[k]);
      entries.forEach(([k, v]) => { dstParent[k] = v; });
    }
  }
}

// ── Table DnD (event delegation on previewArea) ──
const _previewArea = document.getElementById('previewArea');

// Enable row drag only when mousedown is on the grip
_previewArea.addEventListener('mousedown', (e) => {
  const grip = e.target.closest('.drag-grip');
  if (!grip) return;
  const tr = e.target.closest('tr[data-draggable]');
  if (tr) tr.draggable = true;
});

_previewArea.addEventListener('dragstart', (e) => {
  const tr = e.target.closest('tr[data-draggable]');
  if (!tr || !tr.draggable) return;
  e.stopPropagation();
  const r = _tableRows[parseInt(tr.dataset.rowidx)];
  if (!r) return;
  _dndSrcPath = [...r.pathArr];
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('application/json-dnd', '1');
  tr.classList.add('dnd-dragging');
});

_previewArea.addEventListener('dragend', (e) => {
  const tr = e.target.closest('tr');
  if (tr) { tr.draggable = false; tr.classList.remove('dnd-dragging'); }
  document.querySelectorAll('tr.dnd-before,tr.dnd-after,tr.dnd-into').forEach(el =>
    el.classList.remove('dnd-before', 'dnd-after', 'dnd-into')
  );
  _dndSrcPath = null;
});

_previewArea.addEventListener('dragover', (e) => {
  const tr = e.target.closest('tr[data-rowidx]');
  if (!tr || _dndSrcPath === null) return;
  const r = _tableRows[parseInt(tr.dataset.rowidx)];
  if (!r) return;
  if (isDescendantOrSelf(_dndSrcPath, r.pathArr)) { e.dataTransfer.dropEffect = 'none'; return; }
  e.preventDefault();
  e.stopPropagation();
  e.dataTransfer.dropEffect = 'move';

  document.querySelectorAll('tr.dnd-before,tr.dnd-after,tr.dnd-into').forEach(el => {
    if (el !== tr) el.classList.remove('dnd-before', 'dnd-after', 'dnd-into');
  });

  const isContainer = r.type === 'object' || r.type === 'array';
  const zone = _dndZone(tr, e.clientY, isContainer, r.pathArr.length === 0);
  tr.classList.remove('dnd-before', 'dnd-after', 'dnd-into');
  tr.classList.add('dnd-' + zone);
});

_previewArea.addEventListener('dragleave', (e) => {
  const tr = e.target.closest('tr[data-rowidx]');
  if (tr && !tr.contains(e.relatedTarget)) {
    tr.classList.remove('dnd-before', 'dnd-after', 'dnd-into');
  }
});

_previewArea.addEventListener('drop', (e) => {
  const tr = e.target.closest('tr[data-rowidx]');
  if (!tr || _dndSrcPath === null) return;
  e.preventDefault();
  e.stopPropagation();
  const r = _tableRows[parseInt(tr.dataset.rowidx)];
  if (!r) return;
  if (isDescendantOrSelf(_dndSrcPath, r.pathArr)) return;

  const isContainer = r.type === 'object' || r.type === 'array';
  const zone = _dndZone(tr, e.clientY, isContainer, r.pathArr.length === 0);
  tr.classList.remove('dnd-before', 'dnd-after', 'dnd-into');

  const srcPath = [..._dndSrcPath];
  _dndSrcPath = null;
  pushHistory();
  moveItem(srcPath, r.pathArr, zone);
  updateStats(parsedData, null);
  syncEditorFromParsedData();
  render();
  showToast('↕ 移動しました');
});

// ── Toast ──
function showToast(msg, isWarn, isDanger) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isDanger ? 'var(--accent-red)' : isWarn ? 'var(--accent-orange)' : 'var(--accent-green)';
  t.style.color = isDanger ? '#fff' : '#0f1117';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}
